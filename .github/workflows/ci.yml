name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: [push, pull_request]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - run: mvn test
        working-directory: services/api

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: isle_test
          POSTGRES_USER: ht_test_user
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - run: mvn verify
        working-directory: services/api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/isle_test
          SPRING_DATASOURCE_USERNAME: ht_test_user
          SPRING_DATASOURCE_PASSWORD: test
          JWT_PRIVATE_KEY_PATH: src/test/resources/test-jwt-private.pem
          JWT_PUBLIC_KEY_PATH: src/test/resources/test-jwt-public.pem
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: pnpm install && pnpm typecheck
        working-directory: apps/desktop

  docker-smoke-test:
    needs: [backend-unit, backend-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Compose environment
        run: |
          cd infra
          cat > .env << EOF
          POSTGRES_PASSWORD=test
          POSTGRES_DB=isle_test
          POSTGRES_USER=ht_test_user
          SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/isle_test
          SPRING_DATASOURCE_USERNAME=ht_test_user
          SPRING_DATASOURCE_PASSWORD=test
          JWT_PRIVATE_KEY_PATH=/run/secrets/jwt_private
          JWT_PUBLIC_KEY_PATH=/run/secrets/jwt_public
          GOOGLE_CLIENT_ID=test
          GOOGLE_CLIENT_SECRET=test
          CORS_ALLOWED_ORIGIN_PATTERNS=http://localhost:8081
          PUBLIC_API_DOCS_ENABLED=true
          EOF

      - name: Generate test JWT keys
        run: |
          mkdir -p infra/secrets
          openssl genrsa -out infra/secrets/jwt_private.pem 2048
          openssl rsa -in infra/secrets/jwt_private.pem -pubout -out infra/secrets/jwt_public.pem

      - name: Start Isle smoke stack
        run: |
          cd infra
          docker compose up -d --build

      - name: Run smoke test
        run: |
          chmod +x infra/check.sh
          ./infra/check.sh

      - name: Cleanup smoke stack
        if: always()
        run: |
          cd infra
          docker compose down -v

  tauri-rust-check:
    needs: [frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Linux system deps required for Tauri/WebKit
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Check Tauri Rust code
        working-directory: apps/desktop/src-tauri
        run: cargo check
