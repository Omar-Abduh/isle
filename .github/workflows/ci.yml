name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: [push, pull_request]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - run: mvn test
        working-directory: services/api

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: habittracker_test
          POSTGRES_USER: ht_test_user
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - run: mvn verify
        working-directory: services/api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/habittracker_test
          SPRING_DATASOURCE_USERNAME: ht_test_user
          SPRING_DATASOURCE_PASSWORD: test
          JWT_PRIVATE_KEY_PATH: src/test/resources/test-jwt-private.pem
          JWT_PUBLIC_KEY_PATH: src/test/resources/test-jwt-public.pem
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: pnpm install && pnpm typecheck
        working-directory: apps/desktop

  docker-smoke-test:
    needs: [backend-unit, backend-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build services/api -t local-smoke-test:${{ github.sha }}

  # Builds cross-platform Tauri desktop binaries on every version tag push (v*)
  tauri-build:
    needs: [frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 24 }

      - uses: dtolnay/rust-toolchain@stable  # plan fix #7 — correct action name

      # Linux system deps required for Tauri/WebKit
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: pnpm install
        working-directory: apps/desktop

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
          VITE_DEEP_LINK_SCHEME: habittracker
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Isle ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          projectPath: apps/desktop
