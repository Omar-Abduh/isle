name: Release

on:
  push:
    branches:
      - main
      - preview

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      git_tag: ${{ steps.release.outputs.git_tag }}
      source_branch: ${{ steps.meta.outputs.source_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install release dependencies
        run: npm install

      - name: Save source branch
        id: meta
        run: echo "source_branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: node scripts/run-semantic-release.mjs

  docker-publish:
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/isle"
          VERSION="${{ needs.semantic-release.outputs.version }}"
          BRANCH="${{ needs.semantic-release.outputs.source_branch }}"

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$IMAGE:$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$BRANCH" = "main" ]; then
            echo "$IMAGE:latest" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "preview" ]; then
            echo "$IMAGE:beta" >> "$GITHUB_OUTPUT"
          fi

          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set backend version from release tag
        env:
          RELEASE_VERSION: ${{ needs.semantic-release.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            let c = fs.readFileSync('services/api/pom.xml', 'utf8');
            c = c.replace(
              /(<artifactId>api<\/artifactId>\s*\n\s*<version>)[^<]+(<\/version>)/,
              '\$1' + process.env.RELEASE_VERSION + '\$2'
            );
            fs.writeFileSync('services/api/pom.xml', c);
          "

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  tauri-publish:
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build-target: desktop
          - os: windows-latest
            build-target: desktop
          - os: ubuntu-latest
            build-target: desktop
          - os: ubuntu-latest
            build-target: android
    runs-on: ${{ matrix.os }}
    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
      VITE_DEEP_LINK_SCHEME: isle
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 24 }

      - uses: dtolnay/rust-toolchain@stable

      # ─── Linux Desktop ───────────────────────────────────────
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest' && matrix.build-target == 'desktop'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ─── Android ─────────────────────────────────────────────
      - name: Setup Android SDK
        if: matrix.build-target == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: matrix.build-target == 'android'
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "ndk;27.0.12077973" 2>/dev/null || true

      - name: Install Rust Android targets
        if: matrix.build-target == 'android'
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Java for Android build
        if: matrix.build-target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: pnpm install
        working-directory: apps/desktop

      - name: Set desktop version from release tag
        env:
          RELEASE_VERSION: ${{ needs.semantic-release.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8'));
            pkg.version = process.env.RELEASE_VERSION;
            fs.writeFileSync('apps/desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');
            const tauri = JSON.parse(fs.readFileSync('apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
            tauri.version = process.env.RELEASE_VERSION;
            fs.writeFileSync('apps/desktop/src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          "

      - name: Build Tauri app
        if: matrix.build-target == 'desktop'
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: Initialize Android project scaffold
        if: matrix.build-target == 'android'
        working-directory: apps/desktop
        run: pnpm tauri android init

      - name: Set Android adaptive icon background color
        if: matrix.build-target == 'android'
        shell: bash
        run: |
          BG_FILE="apps/desktop/src-tauri/gen/android/app/src/main/res/values/ic_launcher_background.xml"
          if [ -f "$BG_FILE" ]; then
            printf '%s\n%s\n  %s\n%s\n' \
              '<?xml version="1.0" encoding="utf-8"?>' \
              '<resources>' \
              '<color name="ic_launcher_background">#0B0B0C</color>' \
              '</resources>' > "$BG_FILE"
            echo "Updated Android icon background to dark theme (#0B0B0C)"
          else
            echo "Icon background file not found at $BG_FILE"
          fi

      - name: Build Tauri Android app
        if: matrix.build-target == 'android'
        working-directory: apps/desktop
        run: pnpm tauri android build

      - name: Sign and rename Android artifacts
        if: matrix.build-target == 'android'
        shell: bash
        run: |
          VERSION="${{ needs.semantic-release.outputs.version }}"
          OUTPUTS_DIR="apps/desktop/src-tauri/gen/android/app/build/outputs"

          # Generate Android debug keystore if missing
          DEBUG_KEYSTORE="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          if [ ! -f "$DEBUG_KEYSTORE" ]; then
            keytool -genkey -v -keystore "$DEBUG_KEYSTORE" \
              -alias androiddebugkey -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          # Find APKSIGNER in Android SDK build-tools
          APKSIGNER=$(ls $ANDROID_HOME/build-tools/*/apksigner 2>/dev/null | head -1)
          if [ -z "$APKSIGNER" ]; then
            echo "ERROR: apksigner not found in $ANDROID_HOME/build-tools"
            exit 1
          fi
          echo "Using apksigner: $APKSIGNER"

          # Sign and rename APKs
          find "$OUTPUTS_DIR" -name "*.apk" ! -name "signed-*" | while read apk; do
            echo "Signing APK: $apk"
            "$APKSIGNER" sign \
              --ks "$DEBUG_KEYSTORE" \
              --ks-pass pass:android \
              --ks-key-alias androiddebugkey \
              --key-pass pass:android \
              "$apk"

            # Determine architecture from path
            dir=$(dirname "$apk" | sed "s|$OUTPUTS_DIR/apk/||" | tr '/' '-')
            base=$(basename "$apk" | sed 's/app-universal-release-unsigned/app-universal-release/')
            arch=$(echo "$base" | sed -n 's/app-\(.*\)-release.*/\1/p')

            # Rename following: Isle_<version>_<arch>.apk
            renamed="Isle_${VERSION}_${arch}.apk"
            cp "$apk" "$OUTPUTS_DIR/$renamed"
            echo "Renamed to: $renamed"
          done

          # Sign and rename AAB
          find "$OUTPUTS_DIR" -name "*.aab" | while read aab; do
            echo "Signing AAB: $aab"
            jarsigner -keystore "$DEBUG_KEYSTORE" \
              -storepass android -keypass android \
              -digestalg SHA-256 -sigalg SHA256withRSA \
              "$aab" androiddebugkey

            renamed="Isle_${VERSION}.aab"
            cp "$aab" "$OUTPUTS_DIR/$renamed"
            echo "Renamed AAB to: $renamed"
          done

          echo "--- Signed and renamed artifacts ---"
          ls -la "$OUTPUTS_DIR"/Isle_* 2>/dev/null || echo "No signed artifacts found"

      - name: Upload release assets (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          find apps/desktop/src-tauri/target/release/bundle -type f -name "*.dmg" -exec gh release upload "${{ needs.semantic-release.outputs.git_tag }}" {} --clobber \;
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload release assets (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path apps/desktop/src-tauri/target/release/bundle -Recurse -File
          $files | Where-Object { $_.Extension -in '.exe', '.msi' } | ForEach-Object {
            gh release upload "${{ needs.semantic-release.outputs.git_tag }}" $_.FullName --clobber
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload release assets (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.build-target == 'desktop'
        shell: bash
        run: |
          find apps/desktop/src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) -exec gh release upload "${{ needs.semantic-release.outputs.git_tag }}" {} --clobber \;
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload release assets (Android)
        if: matrix.build-target == 'android'
        shell: bash
        run: |
          OUTPUTS_DIR="apps/desktop/src-tauri/gen/android/app/build/outputs"
          found=0
          for f in "$OUTPUTS_DIR"/Isle_*.apk "$OUTPUTS_DIR"/Isle_*.aab; do
            if [ -f "$f" ]; then
              echo "Uploading: $f"
              gh release upload "${{ needs.semantic-release.outputs.git_tag }}" "$f" --clobber
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No signed Android artifacts found. Uploading raw files instead."
            find "$OUTPUTS_DIR" -type f \( -name "*.apk" -o -name "*.aab" \) -exec gh release upload "${{ needs.semantic-release.outputs.git_tag }}" {} --clobber \;
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  back-merge:
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git identity
        run: |
          git config user.name "isle-release-bot"
          git config user.email "release-bot@users.noreply.github.com"

      - name: Back-merge main into preview and dev
        if: needs.semantic-release.outputs.source_branch == 'main'
        run: |
          git fetch origin

          git checkout preview
          git merge origin/main -X theirs --no-edit
          git push origin preview

          if git show-ref --verify --quiet refs/remotes/origin/dev; then
            git checkout dev
            git merge origin/main -X theirs --no-edit
            git push origin dev
          else
            echo "No dev branch found. Skipping lower-environment merge."
          fi

      - name: Back-merge preview into dev
        if: needs.semantic-release.outputs.source_branch == 'preview'
        run: |
          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/dev; then
            git checkout dev
            git merge origin/preview -X theirs --no-edit
            git push origin dev
          else
            echo "No dev branch found. Skipping lower-environment merge."
          fi
